<style>
  :root {
    --bg: #0f1a14;
    --panel: #16241c;
    --panel-2: #1d2f24;
    --line: #294536;
    --ink: #e6ede8;
    --ink-dim: #93a89c;
    --ink-faint: #5f7568;
    --brass: #5a8bb0;
    --brass-bright: #74a6cb;
    --brass-deep: #3d6a8f;
    --green: #6fae8a;
    --red: #cf7b6a;
    --on-accent: #0f1a14;
    --radius: 4px;
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overscroll-behavior-y: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 16px; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header.topbar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(20,23,28,0.86);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    padding: env(safe-area-inset-top) 0 0 0;
  }
  .topbar-inner {
    max-width: 1180px; margin: 0 auto;
    padding: 14px 20px; display: flex; align-items: center; gap: 16px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-family: var(--font-display); font-size: 22px; letter-spacing: 0.5px;
    color: var(--ink);
  }
  .brand .mark b { color: var(--brass); font-weight: normal; }
  .brand .sub {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 600;
  }
  nav.tabs { display: flex; gap: 2px; margin-left: auto; }
  nav.tabs button {
    padding: 8px 16px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--ink-dim); border-radius: var(--radius); position: relative;
    transition: color .15s, background .15s;
  }
  nav.tabs button:hover { color: var(--ink); background: var(--panel-2); }
  nav.tabs button.active { color: var(--bg); background: var(--brass); }
  nav.tabs .spacer { flex: 1; }

  main { flex: 1; max-width: 1180px; width: 100%; margin: 0 auto; padding: 28px 20px 100px; }

  .view-title {
    font-family: var(--font-display); font-size: 26px; font-weight: normal;
    margin-bottom: 4px; display: flex; align-items: center; gap: 12px;
  }
  .view-sub { color: var(--ink-dim); font-size: 14px; margin-bottom: 24px; }
  .count-pill {
    font-family: var(--font-body); font-size: 12px; font-weight: 700;
    background: var(--panel-2); color: var(--brass); padding: 2px 10px;
    border-radius: 20px; border: 1px solid var(--line); letter-spacing: .5px;
  }

  .btn {
    padding: 10px 18px; border-radius: var(--radius); font-weight: 600; font-size: 14px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
    transition: all .15s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { border-color: var(--brass-deep); background: var(--panel); }
  .btn-primary { background: var(--brass); color: var(--on-accent); border-color: var(--brass); }
  .btn-primary:hover { background: var(--brass-bright); border-color: var(--brass-bright); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-dim); }
  .btn-ghost:hover { color: var(--ink); background: var(--panel-2); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--panel); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .filter-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 18px;
    padding: 14px 16px; margin-bottom: 22px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  }
  .filter-group { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .fg-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint); font-weight: 700; margin-right: 2px; }
  .fchip {
    padding: 6px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: var(--bg); border: 1px solid var(--line); color: var(--ink-dim); cursor: pointer;
    transition: all .13s; white-space: nowrap;
  }
  .fchip:hover { border-color: var(--brass-deep); color: var(--ink); }
  .fchip.on { background: var(--brass); color: var(--on-accent); border-color: var(--brass); }
  .fchip.heat.on { background: var(--red); border-color: var(--red); color: #fff; }
  .filter-reset {
    margin-left: auto; font-size: 13px; font-weight: 600; color: var(--ink-dim);
    background: transparent; border: 1px solid var(--line); border-radius: 20px;
    padding: 6px 13px; cursor: pointer; transition: all .13s;
  }
  .filter-reset:hover { border-color: var(--red); color: var(--red); }
  .search-box { position: relative; flex: 1; min-width: 200px; }
  .search-box input {
    width: 100%; padding: 10px 14px 10px 38px; background: var(--panel);
    border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink);
  }
  .search-box input:focus { outline: none; border-color: var(--brass-deep); }
  .search-box svg { position: absolute; left: 12px; top: 11px; color: var(--ink-faint); }
  select.filter {
    padding: 10px 14px; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); color: var(--ink); cursor: pointer;
  }
  select.filter:focus { outline: none; border-color: var(--brass-deep); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    overflow: hidden; transition: transform .18s, border-color .18s, box-shadow .18s;
    cursor: pointer; display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--brass-deep); box-shadow: 0 12px 30px rgba(0,0,0,.35); }
  .card-photo {
    aspect-ratio: 1; background: var(--panel-2) center/cover no-repeat;
    position: relative; display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--line);
  }
  .card-photo .placeholder { color: var(--ink-faint); font-size: 40px; }
  .card-photo-btn {
    position: absolute; bottom: 8px; left: 8px; z-index: 3;
    font-size: 12px; font-weight: 700; color: var(--on-accent); background: var(--brass);
    border: none; border-radius: 20px; padding: 5px 11px; cursor: pointer;
    opacity: 0.92; transition: opacity .15s, transform .15s; box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .card-photo-btn:hover { opacity: 1; transform: translateY(-1px); }
  .card-logo {
    position: absolute; top: 10px; left: 10px; width: 34px; height: 34px;
    border-radius: 50%; background: rgba(20,23,28,.75) center/70% no-repeat;
    border: 1px solid var(--line); backdrop-filter: blur(4px);
  }
  .card-badge {
    position: absolute; bottom: 10px; right: 10px; font-size: 11px; font-weight: 700;
    background: rgba(20,23,28,.82); color: var(--brass); padding: 3px 9px;
    border-radius: 20px; border: 1px solid var(--line); backdrop-filter: blur(4px);
  }
  .card-body { padding: 13px 15px 15px; }
  .card-brand { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--brass); font-weight: 700; }
  .card-model { font-family: var(--font-display); font-size: 17px; margin: 3px 0 8px; line-height: 1.2; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--panel-2);
    color: var(--ink-dim); border: 1px solid var(--line);
  }
  .tag.water { color: var(--green); }
  .tag.loc { color: var(--brass-bright); }
  .tag.heat { color: var(--red); }

  .empty {
    text-align: center; padding: 70px 20px; color: var(--ink-faint);
    border: 1px dashed var(--line); border-radius: 8px;
  }
  .empty .big { font-size: 44px; margin-bottom: 14px; opacity: .5; }
  .empty h3 { font-family: var(--font-display); font-weight: normal; color: var(--ink-dim); margin-bottom: 6px; font-size: 20px; }

  .log-hero {
    background: linear-gradient(160deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: 8px; padding: 24px; margin-bottom: 26px;
  }
  .log-date-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  .log-date-row .label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--ink-faint); font-weight: 700; }
  .log-date-row input[type=date] {
    padding: 8px 12px; background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--radius); color: var(--ink); color-scheme: dark;
  }
  .today-tag { font-size: 12px; color: var(--green); font-weight: 700; }

  .worn-today {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    background: var(--bg); border: 1px solid var(--brass-deep); border-radius: 6px; margin-bottom: 18px;
  }
  .worn-today .wt-photo { width: 56px; height: 56px; border-radius: 6px; background: var(--panel-2) center/cover; flex-shrink: 0; }
  .worn-today .wt-info { flex: 1; }
  .worn-today .wt-info .b { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--brass); font-weight: 700; }
  .worn-today .wt-info .m { font-family: var(--font-display); font-size: 18px; }
  .worn-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .worn-stack .worn-today { margin-bottom: 0; }

  .pick-label { font-size: 13px; color: var(--ink-dim); margin-bottom: 12px; font-weight: 600; }
  .pick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .pick-item {
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
    cursor: pointer; transition: all .15s; text-align: left; position: relative;
  }
  .pick-item:hover { border-color: var(--brass); transform: translateY(-2px); }
  .pick-item.selected { border-color: var(--brass); box-shadow: 0 0 0 1px var(--brass); }
  .pick-item .pi-photo { aspect-ratio: 1.3; background: var(--panel-2) center/cover; }
  .pick-item .pi-body { padding: 8px 10px; }
  .pick-item .pi-brand { font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--brass); font-weight: 700; }
  .pick-item .pi-model { font-size: 13px; line-height: 1.2; margin-top: 2px; }
  .pick-check {
    position: absolute; top: 6px; right: 6px; z-index: 2; width: 22px; height: 22px;
    background: var(--brass); color: var(--on-accent); border-radius: 50%; font-size: 13px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }

  .recent-log { margin-top: 30px; }
  .recent-log h3 { font-family: var(--font-display); font-weight: normal; font-size: 18px; margin-bottom: 14px; }
  .log-row {
    display: flex; align-items: center; gap: 14px; padding: 11px 14px;
    border-bottom: 1px solid var(--line);
  }
  .log-row:hover { background: var(--panel); }
  .log-row .lr-date { font-size: 13px; color: var(--ink-dim); width: 118px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .log-row .lr-photo { width: 38px; height: 38px; border-radius: 5px; background: var(--panel-2) center/cover; flex-shrink: 0; }
  .log-row .lr-name { flex: 1; }
  .log-row .lr-name .b { font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--brass); font-weight: 700; }
  .log-row .lr-name .m { font-size: 14px; }

  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 18px; }
  .stat-card .sc-val { font-family: var(--font-display); font-size: 32px; color: var(--brass); line-height: 1; }
  .stat-card .sc-label { font-size: 12px; color: var(--ink-dim); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  .panel-block { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 22px; margin-bottom: 22px; }
  /* Analyse-Dashboard-Kacheln */
  .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ana-tile {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 26px 20px; text-align: left; cursor: pointer; transition: all .16s;
    display: flex; flex-direction: column; gap: 6px; min-height: 140px;
  }
  .ana-tile:hover { transform: translateY(-3px); border-color: var(--brass-deep); box-shadow: 0 12px 30px rgba(0,0,0,.3); }
  .ana-tile-icon { color: var(--brass); margin-bottom: 10px; }
  .ana-tile-title { font-family: var(--font-display); font-size: 19px; line-height: 1.2; }
  .ana-tile-sub { font-size: 12px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  /* Analyse-Steuerleiste */
  .ana-bar { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
  .ana-filters {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    padding: 14px 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  }
  .bar-fill.dormant { background: linear-gradient(90deg, var(--brass-deep), var(--brass)); }
  .bar-fill.dormant.warn { background: linear-gradient(90deg, #8f4436, var(--red)); }
  .bar-fill.dormant.never { background: var(--panel-2); }
  .bar-fill.dormant.never .v { color: var(--ink-faint); }
  @media (max-width: 900px) { .tile-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .tile-grid { grid-template-columns: 1fr; } }
  .panel-block h3 {
    font-family: var(--font-display); font-weight: normal; font-size: 19px; margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .panel-block .ph-sub { font-size: 13px; color: var(--ink-dim); margin-bottom: 20px; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .bar-row .br-photo {
    width: 34px; height: 34px; border-radius: 5px; flex-shrink: 0;
    background: var(--panel-2) center/cover no-repeat; border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--ink-faint);
  }
  .bar-row .br-label { width: 150px; flex-shrink: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-row .br-label .brand { color: var(--brass); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; display: block; font-weight: 700; }
  .bar-row .br-pct {
    width: 56px; flex-shrink: 0; text-align: center; font-size: 13px; font-weight: 700;
    color: var(--brass); background: var(--bg); border: 1px solid var(--line);
    border-radius: 4px; padding: 4px 0; font-variant-numeric: tabular-nums;
  }
  .bar-track { flex: 1; height: 26px; background: var(--panel-2); border-radius: 4px; overflow: visible; position: relative; }
  .bar-fill { border-radius: 4px; }
  .bar-track > .bar-fill:not(.label-out) { overflow: hidden; }
  .bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--brass-deep), var(--brass));
    border-radius: 4px; transition: width .6s cubic-bezier(.2,.8,.2,1);
    display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
  }
  .bar-fill .v { font-size: 12px; font-weight: 700; color: var(--on-accent); }
  .bar-fill.zero { background: var(--panel-2); }
  .bar-fill.zero .v { color: var(--ink-faint); padding-right: 0; padding-left: 8px; }
  .bar-track { position: relative; }
  .bar-fill.label-out { overflow: visible; justify-content: flex-start; }
  .bar-fill.label-out .v {
    position: absolute; left: 100%; margin-left: 7px; color: var(--ink-dim);
    padding: 0; white-space: nowrap;
  }
  .bar-fill.dormant.never.label-out .v { color: var(--ink-faint); }

  .dormant-list .dm-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .dormant-list .dm-row:last-child { border-bottom: none; }

/* ---------- Indicateur de synchro ---------- */
function syncState(state) { // 'ok' | 'busy' | 'err'
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.classList.remove('busy','err');
  if (state === 'busy') dot.classList.add('busy');
  else if (state === 'err') dot.classList.add('err');
  dot.title = state === 'busy' ? 'Synchronisation…' : state === 'err' ? 'Erreur de synchro' : 'Synchronisé';
}

/* ---------- Chargement depuis Supabase ---------- */
async function loadData() {
  syncState('busy');
  const [wRes, lRes] = await Promise.all([
    sb.from('watches').select('id, data').order('updated_at', { ascending: true }),
    sb.from('wear_logs').select('id, watch_id, date')
  ]);
  if (wRes.error || lRes.error) {
    syncState('err');
    const msg = (wRes.error || lRes.error).message || '';
    if (/relation .* does not exist|schema cache|Could not find the table/i.test(msg)) {
      toast('Tables manquantes — exécute le script SQL dans Supabase');
    } else {
      toast('Erreur de chargement : ' + msg);
    }
    watches = []; logs = [];
    return;
  }
  watches = (wRes.data || []).map(row => {
    const d = row.data || {};
    return {
      rowId: row.id,
      id: d.id || row.id,
      brand: d.brand||'', model: d.model||'', ref: d.ref||'',
      styles: Array.isArray(d.styles) ? d.styles : (d.style ? [d.style] : []),
      location: d.location || '',

      movement: d.movement || '',
      waterResist: d.waterResist || '',
      purchaseDate: d.purchaseDate || '',
      lastService: d.lastService || '',
      notes: d.notes || '',
      photo: d.photo || '', logo: d.logo || ''
    };
  });
  logs = (lRes.data || []).map(row => ({ id: row.id, watchId: row.watch_id, date: row.date }));
  syncState('ok');
}

/* Sérialise une montre pour la colonne jsonb (sans rowId) */

  return {
    id: w.id, brand: w.brand, model: w.model, ref: w.ref,
    styles: w.styles, location: w.location, heatResistant: w.heatResistant,
    movement: w.movement, waterResist: w.waterResist,
    purchaseDate: w.purchaseDate, lastService: w.lastService,
    notes: w.notes, photo: w.photo, logo: w.logo
  };
}

  if (w.rowId) {
    const { error } = await sb.from('watches')
      .update({ data: watchToData(w), updated_at: new Date().toISOString() })
      .eq('id', w.rowId);

  syncState('ok'); return true;
}

/* ---------- Utilitaires ---------- */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr() {
  const d = new Date(); const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off*60000).toISOString().slice(0,10);
}
const MONTHS_FR = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${parseInt(d)} ${MONTHS_FR[parseInt(m)-1]} ${y}`;
}
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function esc(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function watchById(id) { return watches.find(w => w.id === id); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2200);
}
function photoBg(url) { return url ? `background-image:url('${url}')` : ''; }

async function fileToDataURL(file, maxDim) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width*scale); height = Math.round(height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  document.getElementById('pfSort').addEventListener('change', e => { pfSort = e.target.value; drawGrid(); });
  document.getElementById('addWatch').addEventListener('click', () => openEditor(null));

  document.querySelectorAll('.fchip[data-loc]').forEach(btn => btn.addEventListener('click', () => {
    const l = btn.dataset.loc;
    pfLocation = (pfLocation === l) ? '' : l;
    document.querySelectorAll('.fchip[data-loc]').forEach(b => b.classList.toggle('on', b.dataset.loc === pfLocation));
    drawGrid(); refreshResetBtn();
  }));
  document.querySelectorAll('.fchip[data-style]').forEach(btn => btn.addEventListener('click', () => {
    const s = btn.dataset.style;
    if (pfStyles.includes(s)) pfStyles = pfStyles.filter(x => x !== s);
    else pfStyles.push(s);
    btn.classList.toggle('on');
    drawGrid(); refreshResetBtn();
  }));
  document.getElementById('pfHeatChip').addEventListener('click', () => {
    pfHeat = !pfHeat;
    document.getElementById('pfHeatChip').classList.toggle('on', pfHeat);
    drawGrid(); refreshResetBtn();
  });
  document.getElementById('pfReset').addEventListener('click', () => {
    pfSearch = ''; pfStyles = []; pfLocation = ''; pfHeat = false;
    renderPortfolio();
  });

  drawGrid();
}

function refreshResetBtn() {
  const btn = document.getElementById('pfReset');
  if (btn) btn.classList.toggle('hidden', !(pfStyles.length || pfLocation || pfHeat || pfSearch));
}

function wearCount(id) { return logs.filter(l => l.watchId === id).length; }

function drawGrid() {
  const grid = document.getElementById('pfGrid');
  let list = watches.filter(w => {
    const q = pfSearch.toLowerCase();
    const hit = !q || `${w.brand} ${w.model} ${w.ref||''} ${(w.styles||[]).join(' ')}`.toLowerCase().includes(q);
    // Style : UND-Verknüpfung nicht nötig — zeige Uhr, die MINDESTENS einen gewählten Style hat
    const styleOk = pfStyles.length === 0 || (w.styles||[]).some(s => pfStyles.includes(s));
    const locOk = !pfLocation || w.location === pfLocation;
    const heatOk = !pfHeat || w.heatResistant;
    return hit && styleOk && locOk && heatOk;
  });
  const cnt = document.getElementById('pfCount');
  if (cnt) cnt.textContent = (list.length === watches.length)
    ? `${watches.length} montres`
    : `${list.length} / ${watches.length}`;
  if (pfSort === 'brand') list.sort((a,b) => (a.brand+a.model).localeCompare(b.brand+b.model));
  else if (pfSort === 'recent') list.sort((a,b) => (b.purchaseDate||'').localeCompare(a.purchaseDate||''));
  else if (pfSort === 'worn') list.sort((a,b) => wearCount(b.id) - wearCount(a.id));

  if (watches.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="big">⌚</div><h3>Aucune montre</h3><p>Ajoute ta première montre pour construire ton portfolio.</p></div>`;
    return;
  }
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="big">🔍</div><h3>Aucun résultat</h3><p>Ajuste la recherche ou le filtre.</p></div>`;
    return;
  }
  grid.className = 'grid';
  grid.innerHTML = list.map(w => {
    const wc = wearCount(w.id);
    const styleTags = (w.styles||[]).slice(0,3).map(s => `<span class="tag">${esc(s)}</span>`).join('');
    return `
    <div class="card" data-id="${w.id}">
      <div class="card-photo" style="${photoBg(w.photo)}">
        ${!w.photo ? '<span class="placeholder">⌚</span>' : ''}
        ${w.logo ? `<div class="card-logo" style="${photoBg(w.logo)}"></div>` : ''}
        ${wc > 0 ? `<div class="card-badge">${wc}× porté</div>` : ''}
        <button class="card-photo-btn" data-photo-id="${w.id}" title="${w.photo?'Changer la photo':'Ajouter une photo'}">${w.photo?'✎':'＋ photo'}</button>
      </div>
      <div class="card-body">
        <div class="card-brand">${esc(w.brand)||'—'}</div>
        <div class="card-model">${esc(w.model)||'Sans nom'}</div>
        <div class="card-meta">
          ${styleTags}
          ${w.location ? `<span class="tag loc">${esc(w.location)}</span>` : ''}
          ${w.heatResistant ? `<span class="tag heat">Heat-resistant</span>` : ''}
          ${w.waterResist ? `<span class="tag water">${esc(w.waterResist)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c => c.addEventListener('click', e => {
    if (e.target.closest('.card-photo-btn')) return; // géré séparément
    openDetail(c.dataset.id);
  }));
  grid.querySelectorAll('.card-photo-btn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    quickPhotoTarget = btn.dataset.photoId;
    document.getElementById('quickPhotoInput').click();
  }));
}

let quickPhotoTarget = null;
async function handleQuickPhoto(file) {
  if (!file || !quickPhotoTarget) return;
  const w = watchById(quickPhotoTarget);
  if (!w) return;
  toast('Traitement de la photo…');
  const dataUrl = await fileToDataURL(file, 900);
  w.photo = dataUrl;
  const ok = await upsertWatch(w);
  if (ok) { toast(`Photo ajoutée : ${w.brand} ${w.model}`); drawGrid(); }
  quickPhotoTarget = null;
}

function openEditor(id) {

  const photoDrop = document.getElementById('photoDrop');
  const photoInput = document.getElementById('photoInput');
  photoDrop.addEventListener('click', () => photoInput.click());
  photoInput.addEventListener('change', async e => {
    if (!e.target.files[0]) return;
    photoData = await fileToDataURL(e.target.files[0], 900);
    photoDrop.style.backgroundImage = `url('${photoData}')`;
    photoDrop.classList.add('has-img');
  });
  const logoDrop = document.getElementById('logoDrop');
  const logoInput = document.getElementById('logoInput');
  logoDrop.addEventListener('click', () => logoInput.click());
  logoInput.addEventListener('change', async e => {
    if (!e.target.files[0]) return;
    logoData = await fileToDataURL(e.target.files[0], 200);
    logoDrop.style.backgroundImage = `url('${logoData}')`;
    logoDrop.classList.add('has-img'); logoDrop.textContent = '';
  });

  // styles multi-select
  document.querySelectorAll('#styleChips .chip').forEach(chip => chip.addEventListener('click', () => {
    const s = chip.dataset.style;
    if (selStyles.includes(s)) { selStyles = selStyles.filter(x => x!==s); chip.classList.remove('on'); }
    else { selStyles.push(s); chip.classList.add('on'); }
  }));
  // location single-select (toggle)
  document.querySelectorAll('#locChips .chip').forEach(chip => chip.addEventListener('click', () => {
    const l = chip.dataset.loc;
    if (selLoc === l) { selLoc = ''; chip.classList.remove('on'); }
    else {
      selLoc = l;
      document.querySelectorAll('#locChips .chip').forEach(c => c.classList.toggle('on', c.dataset.loc === l));
    }
  }));
  // heat switch
  const heatSwitch = document.getElementById('heatSwitch');
  heatSwitch.addEventListener('click', () => { heat = !heat; heatSwitch.classList.toggle('on', heat); });

  document.getElementById('saveWatch').addEventListener('click', async () => {
    const brand = document.getElementById('f_brand').value.trim();
    const model = document.getElementById('f_model').value.trim();
    if (!brand && !model) { toast('Indique au moins une marque ou un modèle'); return; }
    const btn = document.getElementById('saveWatch');
    btn.disabled = true; btn.textContent = 'Enregistrement…';
    const data = {
      brand, model,
      ref: document.getElementById('f_ref').value.trim(),
      styles: selStyles,
      location: selLoc,
      heatResistant: heat,
      movement: document.getElementById('f_movement').value,
      waterResist: document.getElementById('f_water').value.trim(),
      purchaseDate: document.getElementById('f_purchase').value,
      lastService: document.getElementById('f_service').value,
      notes: document.getElementById('f_notes').value.trim(),
      photo: photoData, logo: logoData
    };
    let target;
    if (id) { target = watchById(id); Object.assign(target, data); }
    else { target = { id: uid(), rowId: null, ...data }; watches.push(target); }
    const ok = await upsertWatch(target);
    if (!ok) {
      btn.disabled = false; btn.textContent = id?'Enregistrer les modifications':'Créer la montre';
      if (!id) watches = watches.filter(x => x !== target); // annule l'ajout local
      return;
    }
    toast(id ? 'Enregistré' : 'Montre créée');
    closeOverlay(); render();
  });

  if (id) {
    document.getElementById('deleteWatch').addEventListener('click', async () => {
      if (!confirm('Supprimer cette montre et tous les enregistrements de port associés ?')) return;
      const w = watchById(id);
      const ok = await deleteWatchRemote(w);
      if (!ok) return;
      watches = watches.filter(x => x.id !== id);
      logs = logs.filter(l => l.watchId !== id);
      closeOverlay(); toast('Supprimé'); render();
    });
  }
}

let logSearch = '';

function renderLog() {
  const main = document.getElementById('main');
  const wornEntries = logs.filter(l => l.date === logDate);
  const wornWatches = wornEntries.map(e => watchById(e.watchId)).filter(Boolean);
  const isToday = logDate === todayStr();

  main.innerHTML = `
    <div class="view-title">Journal de port</div>
    <div class="view-sub">Note quelle(s) montre(s) tu portes.</div>

    <div class="log-hero">
      <div class="log-date-row">
        <span class="label">Date</span>
        <input type="date" id="logDateInput" value="${logDate}" max="${todayStr()}">
        ${isToday ? "<span class=\"today-tag\">● Aujourd'hui</span>" : ''}
        ${wornWatches.length ? `<span class="today-tag" style="color:var(--brass)">${wornWatches.length} portée${wornWatches.length>1?'s':''}</span>` : ''}
      </div>

      ${wornWatches.length ? `
        <div class="worn-stack">
          ${wornWatches.map(w => `
            <div class="worn-today">
              <div class="wt-photo" style="${photoBg(w.photo)}"></div>
              <div class="wt-info">
                <div class="b">${esc(w.brand)}</div>
                <div class="m">${esc(w.model)}</div>
              </div>
              <button class="btn btn-sm btn-danger clearWorn" data-id="${w.id}">Retirer</button>
            </div>
          `).join('')}
        </div>
      ` : `<div class="pick-label">Quelle(s) montre(s) portes-tu${isToday?" aujourd'hui":' ce jour'} ? Touche ci-dessous — tu peux en choisir plusieurs.</div>`}

      ${watches.length ? `
        <div class="search-box" style="margin-bottom:14px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="logSearch" placeholder="Rechercher une montre…" value="${esc(logSearch)}">
        </div>
        <div class="pick-grid" id="pickGrid"></div>
      ` : `<div class="empty" style="padding:40px"><div class="big">⌚</div><h3>Aucune montre</h3><p>Crée d'abord des montres dans la Collection.</p></div>`}
    </div>

    <div class="recent-log" id="recentLog"></div>
  `;

  document.getElementById('logDateInput').addEventListener('change', e => { logDate = e.target.value; renderLog(); });
  document.querySelectorAll('.clearWorn').forEach(btn => btn.addEventListener('click', async () => {
    const entry = logs.find(l => l.date === logDate && l.watchId === btn.dataset.id);
    if (!entry) return;
    const ok = await deleteLogRemote(entry.id);
    if (!ok) return;
    logs = logs.filter(l => l !== entry);
    toast('Enregistrement retiré'); renderLog();
  }));
  const ls = document.getElementById('logSearch');
  if (ls) ls.addEventListener('input', e => { logSearch = e.target.value; drawPickGrid(); });

  drawPickGrid();
  drawRecentLog();
}

function drawPickGrid() {
  const grid = document.getElementById('pickGrid');
  if (!grid) return;
  const wornIds = new Set(logs.filter(l => l.date === logDate).map(l => l.watchId));
  const q = logSearch.toLowerCase();
  const list = watches
    .filter(w => !q || `${w.brand} ${w.model} ${w.ref||''}`.toLowerCase().includes(q))
    .sort((a,b) => (a.brand+a.model).localeCompare(b.brand+b.model));
  grid.innerHTML = list.map(w => `
    <button class="pick-item ${wornIds.has(w.id)?'selected':''}" data-id="${w.id}">
      ${wornIds.has(w.id)?'<span class="pick-check">✓</span>':''}
      <div class="pi-photo" style="${photoBg(w.photo)}"></div>
      <div class="pi-body">
        <div class="pi-brand">${esc(w.brand)}</div>
        <div class="pi-model">${esc(w.model)}</div>
      </div>
    </button>
  `).join('');
  grid.querySelectorAll('.pick-item').forEach(el => el.addEventListener('click', async () => {
    const wid = el.dataset.id;
    const exists = logs.find(l => l.date === logDate && l.watchId === wid);
    const w = watchById(wid);
    if (exists) {
      const ok = await deleteLogRemote(exists.id);
      if (!ok) return;
      logs = logs.filter(l => l !== exists);
      toast(`${w.brand} ${w.model} retirée`);
    } else {
      const rowId = await addLogRemote(wid, logDate);
      if (!rowId) return;
      logs.push({ id: rowId, date: logDate, watchId: wid });
      toast(`${w.brand} ${w.model} enregistrée`);
    }
    renderLog();
  }));
}

function drawRecentLog() {
  const box = document.getElementById('recentLog');
  if (!box) return;
  const byDate = {};
  logs.forEach(l => { (byDate[l.date] = byDate[l.date] || []).push(l); });
  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a)).slice(0, 14);
  if (!dates.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<h3>Derniers enregistrements</h3>` + dates.map(date => {
    return byDate[date].map((l, i) => {
      const w = watchById(l.watchId); if (!w) return '';
      return `<div class="log-row">
        <span class="lr-date">${i === 0 ? fmtDate(date) : ''}</span>
        <div class="lr-photo" style="${photoBg(w.photo)}"></div>
        <div class="lr-name"><div class="b">${esc(w.brand)}</div><div class="m">${esc(w.model)}</div></div>
      </div>`;
    }).join('');
  }).join('');
}

   ============================================================ */
let statsView = 'dashboard';   // 'dashboard' | 'freq-bar' | 'freq-pie' | 'dormant'
// Filter- & Sortierzustand je Detailanalyse (geteilt)
let anaLocation = '';   // '' | 'Paris' | 'Suisse'
let anaStyles = [];     // Mehrfachauswahl
let anaHeat = false;
let anaSort = 'count-desc';

const PALETTE = ['#5a8bb0','#6fae8a','#74a6cb','#4f9d92','#8bb0cf','#9ac0a3','#3d6a8f','#c0a15a','#cf7b6a','#a58bc0'];

/* Wendischt die Trage-Anzahl einer Uhr */
function watchWearCount(id) { return logs.filter(l => l.watchId === id).length; }
function watchLastWorn(id) {
  const ds = logs.filter(l => l.watchId === id).map(l => l.date).sort();
  return ds.length ? ds[ds.length-1] : null;
}

/* Wendet die aktuellen Analyse-Filter auf die Uhrenliste an */
function applyAnaFilters(list) {
  return list.filter(w => {
    const locOk = !anaLocation || w.location === anaLocation;
    const styleOk = anaStyles.length === 0 || (w.styles||[]).some(s => anaStyles.includes(s));
    const heatOk = !anaHeat || w.heatResistant;
    return locOk && styleOk && heatOk;
  });
}

function anaFiltersActive() { return anaLocation || anaStyles.length || anaHeat; }

function renderStats() {
  const main = document.getElementById('main');
  if (!watches.length) {
    main.innerHTML = `<div class="view-title">Analyse</div>
      <div class="empty"><div class="big">📊</div><h3>Pas encore de données</h3><p>Crée des montres et enregistre tes ports pour voir les analyses.</p></div>`;
    return;
  }
  if (statsView === 'dashboard') return renderStatsDashboard();
  if (statsView === 'freq-bar') return renderAnalysis('freq-bar');
  if (statsView === 'freq-pie') return renderAnalysis('freq-pie');
  if (statsView === 'dormant') return renderAnalysis('dormant');
}

/* ---------- Dashboard mit Kacheln ---------- */
function renderStatsDashboard() {
  const main = document.getElementById('main');
  const tiles = [
    { id:'freq-bar', title:'Fréquence de port', sub:'Diagramme à barres', icon:barIcon() },
    { id:'freq-pie', title:'Fréquence de port', sub:'Camembert', icon:pieIcon() },
    { id:'dormant', title:'Depuis quand plus portée', sub:'Diagramme à barres', icon:barIcon() },
  ];
  main.innerHTML = `
    <div class="view-title">Analyse</div>
    <div class="view-sub">Choisis une analyse.</div>
    <div class="tile-grid">
      ${tiles.map(t => `
        <button class="ana-tile" data-tile="${t.id}">
          <div class="ana-tile-icon">${t.icon}</div>
          <div class="ana-tile-title">${t.title}</div>
          <div class="ana-tile-sub">${t.sub}</div>
        </button>
      `).join('')}
    </div>
  `;
  main.querySelectorAll('.ana-tile').forEach(el => el.addEventListener('click', () => {
    statsView = el.dataset.tile;

  }));
}

function barIcon() {
  return `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="4" y2="12"/><line x1="10" y1="20" x2="10" y2="6"/><line x1="16" y1="20" x2="16" y2="14"/><line x1="22" y1="20" x2="2" y2="20"/></svg>`;
}
function pieIcon() {
  return `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12V2a10 10 0 0 1 10 10z" fill="currentColor" stroke="none"/></svg>`;
}

/* ---------- Gemeinsame Filter-/Sortierleiste ---------- */
function anaControlsHTML(sortOptions) {
  return `
    <div class="ana-bar">
      <button class="btn btn-sm" id="anaBack">← Analyses</button>
      <div class="ana-filters">
        <div class="filter-group">
          <span class="fg-label">Location</span>
          ${LOCATIONS.map(l => `<button class="fchip ${anaLocation===l?'on':''}" data-aloc="${l}">${l}</button>`).join('')}
        </div>
        <div class="filter-group">
          <span class="fg-label">Style</span>
          ${STYLES.map(s => `<button class="fchip ${anaStyles.includes(s)?'on':''}" data-astyle="${s}">${s}</button>`).join('')}
        </div>
        <div class="filter-group">
          <span class="fg-label">Attribut</span>
          <button class="fchip heat ${anaHeat?'on':''}" id="anaHeatChip">Heat-resistant</button>
        </div>
        <select class="filter" id="anaSort">
          ${sortOptions.map(o => `<option value="${o.v}" ${anaSort===o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
        <button class="filter-reset ${anaFiltersActive()?'':'hidden'}" id="anaReset">✕ Réinitialiser</button>
      </div>
    </div>
  `;
}

function wireAnaControls(sortOptions) {
  document.getElementById('anaBack').addEventListener('click', () => { statsView='dashboard'; renderStats(); });
  document.querySelectorAll('.fchip[data-aloc]').forEach(b => b.addEventListener('click', () => {
    anaLocation = (anaLocation===b.dataset.aloc)?'':b.dataset.aloc; renderStats();
  }));
  document.querySelectorAll('.fchip[data-astyle]').forEach(b => b.addEventListener('click', () => {
    const s=b.dataset.astyle;
    anaStyles = anaStyles.includes(s) ? anaStyles.filter(x=>x!==s) : [...anaStyles, s];
    renderStats();
  }));
  const hc = document.getElementById('anaHeatChip');
  if (hc) hc.addEventListener('click', () => { anaHeat=!anaHeat; renderStats(); });
  const sel = document.getElementById('anaSort');
  if (sel) sel.addEventListener('change', e => { anaSort=e.target.value; renderStats(); });
  const rs = document.getElementById('anaReset');
  if (rs) rs.addEventListener('click', () => { anaLocation=''; anaStyles=[]; anaHeat=false; renderStats(); });
}

/* ---------- Detailanalysen ---------- */
function renderAnalysis(kind) {
  const main = document.getElementById('main');
  const totalLogs = logs.length;

  // Datensatz je Uhr aufbauen (gefiltert)
  let rows = applyAnaFilters(watches).map(w => {
    const n = watchWearCount(w.id);
    const last = watchLastWorn(w.id);
    const days = last ? daysBetween(last, todayStr()) : null;
    return { w, n, last, days, pct: totalLogs ? n/totalLogs*100 : 0 };
  });

  // Sortieroptionen je Analyse
  const sortOptions = (kind === 'dormant')
    ? [
        { v:'days-desc', l:'Trier : plus longtemps non portée' },
        { v:'days-asc',  l:'Trier : portée récemment' },
        { v:'count-desc',l:'Trier : plus portée' },
        { v:'count-asc', l:'Trier : moins portée' },
        { v:'brand',     l:'Trier : marque' },
      ]
    : [
        { v:'count-desc',l:'Trier : plus portée' },
        { v:'count-asc', l:'Trier : moins portée' },
        { v:'days-desc', l:'Trier : plus longtemps non portée' },
        { v:'days-asc',  l:'Trier : portée récemment' },
        { v:'brand',     l:'Trier : marque' },
      ];
  // gültigen Default sicherstellen
  if (!sortOptions.some(o => o.v === anaSort)) anaSort = sortOptions[0].v;

  // Sortierung anwenden
  const bigDays = 10**9; // null (nie getragen) ganz nach hinten/oben
  rows.sort((a,b) => {
    switch (anaSort) {
      case 'count-desc': return b.n - a.n;
      case 'count-asc':  return a.n - b.n;
      case 'days-desc':  return (b.days===null?bigDays:b.days) - (a.days===null?bigDays:a.days);
      case 'days-asc':   return (a.days===null?bigDays:a.days) - (b.days===null?bigDays:b.days);
      case 'brand':      return (a.w.brand+a.w.model).localeCompare(b.w.brand+b.w.model);
      default: return 0;
    }
  });

  const titleMap = {
    'freq-bar': 'Fréquence de port',
    'freq-pie': 'Fréquence de port',
    'dormant':  'Depuis quand plus portée'
  };
  const count = rows.length;

  let body = '';
  if (kind === 'freq-bar') body = anaBarChart(rows, totalLogs);
  else if (kind === 'freq-pie') body = anaPieChart(rows);
  else if (kind === 'dormant') body = anaDormantChart(rows);

  main.innerHTML = `
    ${anaControlsHTML(sortOptions)}
    <div class="panel-block">
      <h3>${titleMap[kind]} <span class="count-pill">${count} montre${count>1?'s':''}</span></h3>
      ${body}
    </div>
  `;
  wireAnaControls(sortOptions);
  if (kind === 'freq-pie') drawAnaPie(rows);
}

/* Balken: Tragefrequenz */
function anaBarChart(rows, totalLogs) {
  if (!rows.length) return `<div class="ph-sub">Aucune montre ne correspond aux filtres.</div>`;
  const maxN = Math.max(1, ...rows.map(r => r.n));
  return rows.map(r => {
    const pctW = r.n === 0 ? 0 : (r.n / maxN) * 100;
    const inside = pctW >= 14;
    return `
    <div class="bar-row">
      <div class="br-photo" style="${photoBg(r.w.photo)}">${r.w.photo?'':'⌚'}</div>
      <div class="br-label"><span class="brand">${esc(r.w.brand)}</span>${esc(r.w.model)}</div>
      <div class="br-pct">${r.pct.toFixed(1)}%</div>
      <div class="bar-track">
        <div class="bar-fill ${r.n===0?'zero':''} ${inside?'':'label-out'}" style="width:${pctW}%">
          <span class="v">${r.n===0?'jamais':r.n+'×'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* Balken: seit wann nicht mehr getragen */
/* Wandelt Tage in "X an Y mois Z sem W j" (nur Einheiten > 0) */
function formatDuration(totalDays) {
  if (totalDays <= 0) return "auj.";
  let d = totalDays;
  const years = Math.floor(d / 365); d -= years * 365;
  const months = Math.floor(d / 30); d -= months * 30;
  const weeks = Math.floor(d / 7); d -= weeks * 7;
  const days = d;
  const parts = [];
  if (years)  parts.push(years + (years === 1 ? ' an' : ' ans'));
  if (months) parts.push(months + ' mois');
  if (weeks)  parts.push(weeks + ' sem');
  if (days)   parts.push(days + ' j');
  return parts.join(' ');
}

function anaDormantChart(rows) {
  if (!rows.length) return `<div class="ph-sub">Aucune montre ne correspond aux filtres.</div>`;
  const maxDays = Math.max(1, ...rows.map(r => r.days===null ? 0 : r.days));
  return rows.map(r => {
    const isNever = r.days === null;
    // echte proportionale Breite (0 Tage => 0 %); nie getragen => voller Balken
    const pctW = isNever ? 100 : (r.days / maxDays) * 100;
    const cls = isNever ? 'never' : (r.days>=30 ? 'warn' : '');
    const label = isNever ? 'jamais' : formatDuration(r.days);
    // Label passt bei längerem Text seltener rein: Schwelle höher -> öfter daneben
    const inside = isNever || pctW >= 40;
    return `
    <div class="bar-row">
      <div class="br-photo" style="${photoBg(r.w.photo)}">${r.w.photo?'':'⌚'}</div>
      <div class="br-label"><span class="brand">${esc(r.w.brand)}</span>${esc(r.w.model)}</div>
      <div class="bar-track">
        <div class="bar-fill dormant ${cls} ${inside?'':'label-out'}" style="width:${pctW}%">
          <span class="v">${label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* Kreisdiagramm: Tragefrequenz je Uhr */
function anaPieChart(rows) {
  const withWear = rows.filter(r => r.n > 0);
  if (!withWear.length) return `<div class="ph-sub">Aucune montre portée ne correspond aux filtres.</div>`;
  const total = withWear.reduce((s,r) => s+r.n, 0);
  return `
    <div class="donut-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200" id="anaPie"></svg>
      <div class="donut-legend">
        ${withWear.map((r,i) => `
          <div class="legend-row">
            <span class="legend-swatch" style="background:${PALETTE[i%PALETTE.length]}"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.w.brand)} ${esc(r.w.model)}</span>
            <span class="lg-val">${r.n}× · ${Math.round(r.n/total*100)}%</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function drawAnaPie(rows) {
  const svg = document.getElementById('anaPie');
  if (!svg) return;
  const withWear = rows.filter(r => r.n > 0);
  const total = withWear.reduce((s,r) => s+r.n, 0);
  const cx=100, cy=100, r=70, sw=32;
  let angle = -Math.PI/2, html = '';
  withWear.forEach((row,i) => {
    const frac = row.n/total;
    const a2 = angle + frac*Math.PI*2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + r*Math.cos(angle), y1 = cy + r*Math.sin(angle);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    if (withWear.length === 1) {
      html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${PALETTE[0]}" stroke-width="${sw}"/>`;
    } else {
      html += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${PALETTE[i%PALETTE.length]}" stroke-width="${sw}"/>`;
    }
    angle = a2;
  });
  html += `<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--ink)" font-family="Georgia" font-size="28">${total}</text>`;
  html += `<text x="${cx}" y="${cy+16}" text-anchor="middle" fill="var(--ink-faint)" font-size="11" letter-spacing="1">PORTS</text>`;
  svg.innerHTML = html;
}

/* ============================================================
   AUTHENTIFICATION
   ============================================================ */
let authMode = 'login'; // 'login' | 'signup'

function authMsg(text, kind) {
  const el = document.getElementById('authMsg');
  el.textContent = text || '';
  el.className = 'auth-msg' + (kind ? ' ' + kind : '');
}

function renderAuthMode() {
  const submit = document.getElementById('authSubmit');
  const toggle = document.getElementById('authToggle');
  const pw = document.getElementById('authPassword');
  if (authMode === 'login') {
    submit.textContent = 'Se connecter';
    toggle.innerHTML = 'Pas encore de compte ? <a>Créer un compte</a>';
    pw.autocomplete = 'current-password';
  } else {
    submit.textContent = 'Créer mon compte';
    toggle.innerHTML = 'Déjà un compte ? <a>Se connecter</a>';
    pw.autocomplete = 'new-password';
  }
  authMsg('');
}

async function handleAuthSubmit() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { authMsg('Renseigne email et mot de passe', 'err'); return; }
  if (password.length < 6) { authMsg('Mot de passe : 6 caractères minimum', 'err'); return; }
  const submit = document.getElementById('authSubmit');
  submit.disabled = true; submit.textContent = '…';

  if (authMode === 'signup') {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { authMsg(error.message, 'err'); submit.disabled = false; renderAuthMode(); return; }
    if (data.session) { await enterApp(); return; }
    // pas de session => confirmation email requise
    authMsg('Compte créé. Vérifie tes emails pour confirmer, puis connecte-toi.', 'ok');
    authMode = 'login'; submit.disabled = false; renderAuthMode();
    authMsg('Compte créé. Confirme par email si demandé, puis connecte-toi.', 'ok');
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { authMsg(error.message, 'err'); submit.disabled = false; renderAuthMode(); return; }
    await enterApp();
  }
}

async function enterApp() {
  const { data } = await sb.auth.getUser();
  currentUser = data.user;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  const emailEl = document.getElementById('userEmail');
  if (emailEl && currentUser) emailEl.textContent = currentUser.email;
  await loadData();
  render();
}

function wireAuthUI() {
  document.getElementById('authSubmit').addEventListener('click', handleAuthSubmit);
  document.getElementById('authToggle').addEventListener('click', e => {
    if (e.target.tagName === 'A') { authMode = authMode === 'login' ? 'signup' : 'login'; renderAuthMode(); }
  });
  document.getElementById('authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuthSubmit();
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.reload();
  });
}

/* ============================================================
   INIT
   ============================================================ */
(async function init() {
  wireAuthUI();
  renderAuthMode();
  const qp = document.getElementById('quickPhotoInput');
  if (qp) qp.addEventListener('change', e => { handleQuickPhoto(e.target.files[0]); e.target.value = ''; });
  const { data } = await sb.auth.getSession();
  if (data.session) {
    await enterApp();
  }
})();
</script>
